<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} Student | SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        .card {
            background: var(--white);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-bottom: 2rem;
            text-align: center;
            color: var(--primary);
            font-weight: 800;
            font-size: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #f1f5f9;
            border-radius: 1rem;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: #f8fafc;
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1.5rem;
            font-size: 1rem;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        .btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>{{ action }} Student</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" name="roll_no" value="{{ student.roll_no }}" placeholder="Enter Roll Number"
                    required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ student.name }}" placeholder="Enter Student Name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ student.email }}" placeholder="Enter Email" required>
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" name="course" value="{{ student.course }}" placeholder="Enter Course Name" required>
            </div>
            <button type="submit" class="btn">Save Student Profile</button>
        </form>
        <a href="{% url 'student_list' %}" class="back">← Return to Dashboard</a>
    </div>
</body>

</html>
