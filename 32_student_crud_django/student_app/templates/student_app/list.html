{% extends 'student_app/base.html' %}

{% block content %}
<h1>Student Records</h1>
<a href="{% url 'student_create' %}" class="btn btn-add">+ Add New Student</a>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_no }}</td>
            <td>{{ student.course }}</td>
            <td>
                <a href="{% url 'student_update' student.pk %}" class="btn btn-edit">Edit</a>
                <a href="{% url 'student_delete' student.pk %}" class="btn btn-delete">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" style="text-align: center; color: #777;">No student records found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
