{% extends 'student_app/base.html' %}

{% block content %}
<h1>Delete Record</h1>
<p style="text-align: center; font-size: 1.1rem; color: #444;">
    Are you sure you want to delete the record for <strong>{{ student.name }}</strong>?
</p>

<form method="post">
    {% csrf_token %}
    <div class="actions" style="text-align: center;">
        <a href="{% url 'student_list' %}" class="btn btn-back">Cancel</a>
        <button type="submit" class="btn btn-delete">Yes, Delete</button>
    </div>
</form>
{% endblock %}
