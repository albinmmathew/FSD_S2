<!DOCTYPE html>
<html>

<head>
    <title>Success</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .success-box {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            color: #28a745;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            font-size: 1.2rem;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 10px 25px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="success-box">
        <h1>Thank You!</h1>
        <p>Your feedback has been successfully submitted.</p>
        <a href="{% url 'feedback' %}" class="btn">Submit Another</a>
    </div>
</body>

</html>
