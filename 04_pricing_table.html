<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pricing</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background: #fff;
            color: #202124;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 40px;
        }

        .pricing-table {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .plan {
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 30px;
            width: 200px;
            text-align: left;
            transition: all 0.3s;
        }

        .plan:hover {
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.30), 0 2px 6px 2px rgba(60, 64, 67, 0.15);
            border-color: transparent;
        }

        .header {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            color: #5f6368;
            letter-spacing: 0.5px;
        }

        .price {
            font-size: 36px;
            margin: 20px 0;
        }

        .price small {
            font-size: 16px;
            font-weight: 400;
            color: #5f6368;
        }

        .features {
            font-size: 14px;
            color: #3c4043;
            line-height: 2;
            margin-bottom: 30px;
        }

        button {
            width: 100%;
            padding: 10px 24px;
            background: #fff;
            color: #1a73e8;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #f1f3f4;
            border-color: #d2e3fc;
            color: #174ea6;
        }

        button.primary {
            background: #1a73e8;
            color: white;
            border: none;
        }

        button.primary:hover {
            background: #1765cc;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.30), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        }
    </style>
</head>

<body>

    <h2>Pricing Plans</h2>
    <div class="pricing-table">
        <div class="plan">
            <div class="header">Basic</div>
            <div class="price">₹0<small>/mo</small></div>
            <div class="features">10GB Storage<br>Basic Support</div>
            <button>Get Started</button>
        </div>
        <div class="plan">
            <div class="header">Pro</div>
            <div class="price">₹299<small>/mo</small></div>
            <div class="features">100GB Storage<br>Priority Support</div>
            <button class="primary">Get Started</button>
        </div>
        <div class="plan">
            <div class="header">Business</div>
            <div class="price">₹499<small>/mo</small></div>
            <div class="features">Unlimited Storage<br>24/7 Support</div>
            <button>Contact Sales</button>
        </div>
    </div>

</body>

</html>
