<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            color: #fff;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: #1a73e8;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #f1f3f4;
        }

        .weather-info {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .temp {
            font-size: 4em;
            font-weight: 300;
            margin: 10px 0;
        }

        .condition {
            font-size: 1.2em;
            margin-bottom: 30px;
            text-transform: capitalize;
            color: rgba(255, 255, 255, 0.8);
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .detail-item {
            text-align: left;
        }

        .detail-item label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .detail-item span {
            font-size: 1.1em;
            font-weight: 500;
        }

        .error {
            color: #ff8a80;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="weather-card">
        <h2>Weather Pro</h2>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button onclick="getWeather()">Search</button>
        </div>

        <div id="error" class="error">City not found</div>

        <div id="weatherInfo" class="weather-info">
            <div id="cityName" style="font-size: 1.5em; font-weight: 500;"></div>
            <div class="temp" id="temp">--°C</div>
            <div class="condition" id="condition">--</div>

            <div class="details">
                <div class="detail-item">
                    <label>Humidity</label>
                    <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <label>Wind Speed</label>
                    <span id="wind">-- km/h</span>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const weatherInfo = document.getElementById('weatherInfo');
            const error = document.getElementById('error');

            if (!city) return;

            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${CONFIG.WEATHER_API_KEY}&units=metric`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('City not found');
                const data = await response.json();

                // Processing the JSON response
                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
                document.getElementById('condition').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = `${data.main.humidity}%`;
                document.getElementById('wind').innerText = `${data.wind.speed} m/s`;

                weatherInfo.style.display = 'block';
                error.style.display = 'none';
            } catch (err) {
                weatherInfo.style.display = 'none';
                error.style.display = 'block';
                console.error(err);
            }
        }

        // Enter key support
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });
    </script>
</body>

</html>
