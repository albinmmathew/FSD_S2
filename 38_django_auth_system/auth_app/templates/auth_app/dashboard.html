<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | Secure Auth</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 2rem;
            color: var(--text);
        }

        .container {
            max-width: 600px;
            margin: 4rem auto;
        }

        .card {
            background: var(--card);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            color: #64748b;
            font-size: 1.125rem;
            margin-bottom: 2.5rem;
        }

        .btn-logout {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn-logout:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <span class="status-badge">Secure Session Active</span>
            <h1>Hello, {{ user.username }}!</h1>
            <p>You have successfully logged in using our secure authentication system with hashed passwords.</p>

            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout" style="border:none; cursor:pointer;">Log Out</button>
            </form>
        </div>
    </div>
</body>

</html>
