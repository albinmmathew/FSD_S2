<!DOCTYPE html>
<html>

<head>
    <title>My Blog</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fdfdfd;
        }

        header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #111;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            margin: 0 10px;
        }

        nav a:hover {
            color: #000;
        }

        .container {
            min-height: 60vh;
        }

        footer {
            border-top: 1px solid #eee;
            margin-top: 50px;
            padding: 20px 0;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        .post-card {
            margin-bottom: 40px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .post-card h2 {
            margin-bottom: 5px;
        }

        .post-card h2 a {
            text-decoration: none;
            color: #222;
            transition: 0.3s;
        }

        .post-card h2 a:hover {
            color: #007bff;
        }

        .date {
            color: #999;
            font-size: 0.85rem;
            font-style: italic;
        }

        .content {
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header>
        <h1>ALBIN's BLOG</h1>
        <nav><a href="{% url 'post_list' %}">Home</a></nav>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2026 Albin Mammen Mathew
    </footer>
</body>

</html>
