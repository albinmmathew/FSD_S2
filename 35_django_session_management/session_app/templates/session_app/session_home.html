<!DOCTYPE html>
<html>

<head>
    <title>Session Management</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }

        .info {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1967d2;
            font-weight: 500;
        }

        form {
            margin-top: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
        }

        .btn-primary:hover {
            background: #1557b0;
        }

        .btn-danger {
            background: #ea4335;
            color: white;
        }

        .btn-danger:hover {
            background: #c5221f;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Session Console</h1>
        <div class="info">
            Welcome back, <strong>{{ user_name }}</strong>!<br>
            Your Total Visits: <strong>{{ visit_count }}</strong>
        </div>

        <div style="text-align: left; margin-bottom: 20px;">
            <p
                style="font-size: 0.9rem; color: #666; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                Active Session Users:</p>
            <ul style="list-style: none; padding: 0; font-size: 0.85rem; color: #444;">
                {% for active_user in all_users %}
                <li>👤 {{ active_user.name }} <span style="color: #999; font-size: 0.7rem;">(online)</span></li>
                {% empty %}
                <li style="color: #999;">Only you are here.</li>
                {% endfor %}
            </ul>
        </div>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Update your name..." required>
            <button type="submit" class="btn btn-primary">Save to Session</button>
        </form>

        <a href="{% url 'clear_session' %}" class="btn btn-danger">Clear Session Data</a>
    </div>
</body>

</html>
