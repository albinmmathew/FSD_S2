<!DOCTYPE html>
<html>

<head>
    <title>Home | Role Auth</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #1a73e8;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-blue {
            background: #1a73e8;
            color: white;
        }

        .btn-red {
            background: #ea4335;
            color: white;
        }

        .btn-gray {
            background: #5f6368;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Role System</h1>
        {% if user.is_authenticated %}
        <p>Welcome, <strong>{{ user.username }}</strong></p>
        <ul>
            <li><a href="{% url 'admin_dashboard' %}" class="btn btn-blue">Admin Dashboard</a></li>
            <li><a href="{% url 'manager_dashboard' %}" class="btn btn-blue">Manager Dashboard</a></li>
        </ul>
        <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button type="submit"
                class="btn btn-red">Logout</button></form>
        {% else %}
        <p><a href="{% url 'login' %}" class="btn btn-blue">Login</a></p>
        {% endif %}
    </div>
</body>

</html>
