<!DOCTYPE html>
<html>

<head>
    <title>Manager Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard-card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-top: 5px solid #007bff;
            width: 400px;
        }

        h1 {
            color: #007bff;
            margin-bottom: 0.5rem;
        }

        p {
            color: #555;
            font-size: 1.1rem;
        }

        .user-name {
            font-weight: bold;
            color: #333;
        }

        .logout-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1.5rem;
        }

        .logout-btn:hover {
            background: #0056b3;
        }

        .nav-link {
            display: block;
            margin-top: 1rem;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="dashboard-card">
        <h1>Manager Panel</h1>
        <p>Welcome, <span class="user-name">{{ user.username }}</span></p>
        <p>You have <strong>Managerial</strong> privileges.</p>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>

        <a href="{% url 'home' %}" class="nav-link">Return to Home</a>
    </div>
</body>

</html>
