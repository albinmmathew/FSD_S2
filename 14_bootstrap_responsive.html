<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Multi-Section</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 600;
            color: #0d6efd !important;
        }

        .hero-section {
            padding: 80px 0;
            background: #fff;
            border-bottom: 1px solid #dee2e6;
        }

        .form-card {
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .footer {
            padding: 40px 0;
            background: #212529;
            color: #adb5bd;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">PortalX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#forms">Get Started</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold">Enterprise Software Solutions</h1>
                    <p class="lead">Built with the power of Bootstrap 5. Responsive, fast, and accessible for everyone.
                    </p>
                    <a href="#forms" class="btn btn-primary btn-lg px-4 me-md-2">Join Now</a>
                </div>
                <div class="col-lg-6 mt-5 mt-lg-0">
                    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80"
                        class="img-fluid rounded-3 shadow" alt="Dashboard">
                </div>
            </div>
        </div>
    </header>

    <!-- Forms Section -->
    <section id="forms" class="py-5">
        <div class="container">
            <div class="row justify-content-center g-4">
                <!-- Login Column -->
                <div class="col-md-5">
                    <div class="card form-card h-100">
                        <div class="card-body p-5">
                            <h3 class="card-title mb-4">Login</h3>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label text-secondary">Email address</label>
                                    <input type="email" class="form-control" placeholder="name@example.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary">Password</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Registration Column -->
                <div class="col-md-5">
                    <div class="card form-card h-100 border-start border-primary border-5">
                        <div class="card-body p-5">
                            <h3 class="card-title mb-4">Register</h3>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label text-secondary">Full Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary">Email</label>
                                    <input type="email" class="form-control" placeholder="john@example.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary">Create Password</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn btn-outline-primary w-100 py-2">Create Account</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 PortalX. Designed using Bootstrap 5 Grid System.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
