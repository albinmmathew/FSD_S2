<!DOCTYPE html>
<html>

<head>
    <title>Edit Student | Dynamic URL</title>
</head>

<body>
    <h1>Edit Student (ID: {{ student.pk }})</h1>
    <form method="post">
        {% csrf_token %}
        <p>First Name: <input type="text" name="first_name" value="{{ student.first_name }}" required></p>
        <p>Last Name: <input type="text" name="last_name" value="{{ student.last_name }}" required></p>
        <p>Roll Number: <input type="text" name="roll_number" value="{{ student.roll_number }}" required></p>
        <p>Email: <input type="email" name="email" value="{{ student.email }}" required></p>
        <button type="submit">Update</button>
    </form>
    <br>
    <a href="{% url 'student_list' %}">Cancel</a>
</body>

</html>
