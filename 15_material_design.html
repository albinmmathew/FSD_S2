<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Components</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .m-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 350px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: box-shadow 0.3s;
        }

        .m-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .m-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .m-card-content {
            padding: 16px;
        }

        .m-card-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin: 0 0 8px 0;
            color: rgba(0, 0, 0, 0.87);
        }

        .m-card-subtitle {
            font-size: 0.875rem;
            color: rgba(0, 0, 0, 0.6);
            margin-bottom: 16px;
        }

        .m-card-actions {
            padding: 8px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 8px;
        }

        /* Material Buttons */
        .m-btn {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.089em;
            padding: 0 16px;
            height: 36px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, box-shadow 0.2s;
            background: transparent;
            color: #6200ee;
        }

        .m-btn:hover {
            background: rgba(98, 0, 238, 0.04);
        }

        .m-btn-contained {
            background: #6200ee;
            color: white;
            box-shadow: 0 3px 1px -2px rgba(0, 0, 0, 0.2), 0 2px 2px 0 rgba(0, 0, 0, 0.14), 0 1px 5px 0 rgba(0, 0, 0, 0.12);
        }

        .m-btn-contained:hover {
            background: #3700b3;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.2), 0 4px 5px 0 rgba(0, 0, 0, 0.14), 0 1px 10px 0 rgba(0, 0, 0, 0.12);
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #03dac6;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 5px -1px rgba(0, 0, 0, 0.2), 0 6px 10px 0 rgba(0, 0, 0, 0.14), 0 1px 18px 0 rgba(0, 0, 0, 0.12);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1 style="font-weight: 300; margin-bottom: 40px;">Material Design UI</h1>

    <div class="m-card">
        <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=800&q=80"
            class="m-card-image" alt="Artwork">
        <div class="m-card-content">
            <h2 class="m-card-title">Modern Abstract</h2>
            <div class="m-card-subtitle">Digital Art • Published Feb 2026</div>
            <p style="font-size: 0.875rem; color: rgba(0,0,0,0.7); line-height: 1.5;">Expressive geometric shapes and
                vibrant colors come together in this stunning display of modern digital aesthetics.</p>
        </div>
        <div class="m-card-actions">
            <button class="m-btn">Share</button>
            <button class="m-btn m-btn-contained">Explore</button>
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab">
        <span class="material-icons">add</span>
    </div>

</body>

</html>
