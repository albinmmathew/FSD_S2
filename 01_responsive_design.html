<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Elements</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #202124;
            background: #f8f9fa;
        }

        header {
            background: #fff;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #dadce0;
        }

        h1 {
            margin: 0;
            font-weight: 400;
            font-size: 24px;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #5f6368;
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        nav a:hover {
            color: #1a73e8;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        main {
            flex: 70%;
            padding-right: 20px;
        }

        article {
            background: #fff;
            padding: 30px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 400;
            color: #1a73e8;
            margin-top: 0;
        }

        aside {
            flex: 30%;
        }

        .sidebar-card {
            background: #fff;
            padding: 20px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .sidebar-card h3 {
            margin-top: 0;
            font-weight: 400;
        }

        footer {
            background: #f8f9fa;
            color: #5f6368;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #dadce0;
            margin-top: 20px;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            main {
                padding-right: 0;
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>My Tech Blog</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="container">
        <main>
            <article>
                <h2>Understanding Responsive Design</h2>
                <p>Responsive design ensures your website looks good on all devices. Use media queries to change the
                    layout based on screen size.</p>
            </article>
        </main>

        <aside>
            <div class="sidebar-card">
                <h3>Sidebar</h3>
                <p><a href="#">Link 1</a></p>
                <p><a href="#">Link 2</a></p>
                <p><a href="#">Link 3</a></p>
            </div>
        </aside>
    </div>

    <footer>
        <p>&copy; Blog 2024</p>
    </footer>

</body>

</html>
