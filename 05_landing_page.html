<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            color: #202124;
        }

        header {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .header-content {
            max-width: 800px;
        }

        h1 {
            font-weight: 300;
            margin-bottom: 20px;
            font-size: 3em;
            color: white;
        }

        .header-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #f1f3f4;
        }

        button {
            padding: 12px 30px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
            transition: background 0.3s;
        }

        button:hover {
            background: #1765cc;
        }

        section {
            padding: 60px 20px;
            text-align: center;
            background: #fff;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .feature {
            background: #fff;
            padding: 30px;
            width: 250px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .feature h3 {
            font-weight: 500;
            margin-top: 0;
        }

        .feature p {
            font-size: 14px;
            margin-bottom: 0;
            color: #5f6368;
        }

        footer {
            background: #f8f9fa;
            color: #5f6368;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #dadce0;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            header {
                height: 400px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <h1>Welcome to My Website</h1>
            <p>We build simple and effective solutions for everyone. Start your journey with us today.</p>
            <button>Get Started</button>
        </div>
    </header>

    <section>
        <h2>Features</h2>
        <div class="features">
            <div class="feature">
                <h3>Fast</h3>
                <p>Optimized for speed and performance.</p>
            </div>
            <div class="feature">
                <h3>Secure</h3>
                <p>Your data is protected with us.</p>
            </div>
            <div class="feature">
                <h3>Reliable</h3>
                <p>99.9% uptime guaranteed.</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Landing Page</p>
    </footer>

</body>

</html>
