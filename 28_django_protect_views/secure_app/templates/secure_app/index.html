<!DOCTYPE html>
<html>

<head>
    <title>Public Home</title>
</head>

<body>
    <h1>Public Home Page</h1>
    <p>This page is accessible to everyone.</p>
    <hr>
    <a href="{% url 'dashboard' %}">Go to Protected Dashboard</a>
    {% if user.is_authenticated %}
    | <form action="{% url 'logout' %}" method="post" style="display:inline;">{% csrf_token %}<button
            type="submit">Logout</button></form>
    {% else %}
    | <a href="{% url 'login' %}">Login</a>
    {% endif %}
</body>

</html>
