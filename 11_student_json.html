<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            padding: 40px 20px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-weight: 400;
            width: 100%;
            max-width: 500px;
            text-align: left;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
            background: #fff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f1f3f4;
        }

        th {
            background: #fff;
            font-weight: 500;
            color: #5f6368;
            font-size: 14px;
            border-bottom: 2px solid #f1f3f4;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .grade-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .grade-A {
            background: #e6f4ea;
            color: #137333;
        }

        .grade-B {
            background: #fef7e0;
            color: #b06000;
        }

        .grade-C {
            background: #fce8e6;
            color: #c5221f;
        }
    </style>
</head>

<body>

    <h2>Student Grades</h2>
    <table id="studentTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const students = [
            { id: 1, name: "Abhijith", age: 20, grade: "B+" },
            { id: 2, name: "Albin", age: 22, grade: "A" },
            { id: 3, name: "Anand", age: 21, grade: "A+" },
            { id: 4, name: "Jibin", age: 23, grade: "B" },
            { id: 5, name: "Mathews", age: 20, grade: "A" }
        ];

        const tbody = document.querySelector('#studentTable tbody');

        students.forEach(s => {
            const gradeClass = s.grade.startsWith('A') ? 'grade-A' : (s.grade.startsWith('B') ? 'grade-B' : 'grade-C');
            const row = `<tr>
                <td>${s.id}</td>
                <td>${s.name}</td>
                <td>${s.age}</td>
                <td><span class="grade-badge ${gradeClass}">${s.grade}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    </script>
</body>

</html>
