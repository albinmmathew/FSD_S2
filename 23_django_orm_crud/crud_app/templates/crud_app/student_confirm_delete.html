<!DOCTYPE html>
<html>

<head>
    <title>Delete Student</title>
</head>

<body>
    <h1>Delete Student</h1>
    <p>Are you sure you want to delete "{{ student }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
    </form>
    <br>
    <a href="{% url 'student_list' %}">Cancel</a>
</body>

</html>
