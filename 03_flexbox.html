<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            padding: 40px;
            background: #f8f9fa;
            color: #202124;
        }

        h2 {
            text-align: center;
            font-weight: 400;
        }

        .flex-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .flex-item {
            background: #fff;
            padding: 30px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
            width: 150px;
            transition: box-shadow 0.3s;
        }

        .flex-item:hover {
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.30), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
            border-color: transparent;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: #e8f0fe;
            color: #1967d2;
            border-radius: 50%;
            line-height: 60px;
            margin: 0 auto 15px;
            font-weight: 500;
            font-size: 24px;
        }

        .name {
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <h2>Team Members</h2>
    <div class="flex-container">
        <div class="flex-item">
            <div class="avatar">A</div>
            <div class="name">Albin</div>
        </div>
        <div class="flex-item">
            <div class="avatar">G</div>
            <div class="name">Glidin</div>
        </div>
        <div class="flex-item">
            <div class="avatar">J</div>
            <div class="name">Joyal</div>
        </div>
    </div>

</body>

</html>
